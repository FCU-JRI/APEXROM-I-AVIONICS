<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRI P2026 Ground Control System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #05060a; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
        .glass-panel { background: rgba(15,20,30,0.85); border: 1px solid rgba(0,255,255,0.1); border-radius: 4px; position: relative; }
        .glow-cyan   { box-shadow: 0 0 20px rgba(0,255,255,0.1); border-color: rgba(0,255,255,0.3); }
        .text-neon   { color: #00ffcc; text-shadow: 0 0 8px rgba(0,255,204,0.4); }
        .btn-base      { transition: all 0.2s; cursor: pointer; text-transform: uppercase; font-weight: bold; border-radius: 2px; }
        .btn-sequence  { background: rgba(0,150,255,0.1);  border: 1px solid #0096ff; color: #0096ff; font-size: 10px; }
        .btn-sequence:hover  { background: rgba(0,150,255,0.25);  box-shadow: 0 0 10px #0096ff; }
        .btn-emergency { background: rgba(255,49,49,0.1);  border: 1px solid #ff3131; color: #ff3131; font-size: 11px; }
        .btn-emergency:hover { background: rgba(255,49,49,0.3);   box-shadow: 0 0 15px #ff3131; }
        .btn-warning   { background: rgba(255,204,0,0.1);  border: 1px solid #ffcc00; color: #ffcc00; font-size: 11px; }
        .btn-warning:hover   { background: rgba(255,204,0,0.25);  box-shadow: 0 0 10px #ffcc00; }
        .btn-debug     { background: rgba(130,130,130,0.1);border: 1px solid #888;    color: #888;    font-size: 10px; }
        .btn-debug:hover     { background: rgba(130,130,130,0.2); }
        .terminal-box  { height: 110px; background: #000; border: 1px solid #1a2a33; overflow-y: auto; font-size: 8px; line-height: 1.2; padding: 4px; }
        .terminal-line { border-left: 2px solid #00ffcc; padding-left: 6px; margin-bottom: 2px; background: rgba(0,255,204,0.02); }
        .scanline { width:100%; height:2px; background:linear-gradient(to bottom,transparent,rgba(0,255,255,0.05),transparent); position:absolute; top:0; left:0; animation:scan 8s linear infinite; pointer-events:none; z-index:100; }
        @keyframes scan { 0%{top:0%} 100%{top:100%} }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.2); }
    </style>
</head>
<body class="p-3">
    <div id="root" class="h-full"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // STATENUM — 對應 StateMachine.hpp enum（值 0-17）
        const STATES = {
            0:  { name:"STBY_IDLE",         label:"待機",              group:"standby", next:[1,2,7,15,16,17], critical:false },
            1:  { name:"STBY_BIT",          label:"自我測試",           group:"standby", next:[0],            critical:false },
            2:  { name:"CAL_GYRO",          label:"陀螺儀校準",         group:"cal",     next:[3],            critical:false },
            3:  { name:"CAL_ACCEL",         label:"加速計校準",         group:"cal",     next:[4],            critical:false },
            4:  { name:"CAL_MAG",           label:"磁力計校準",         group:"cal",     next:[5],            critical:false },
            5:  { name:"CAL_BARO",          label:"氣壓計校準",         group:"cal",     next:[6],            critical:false },
            6:  { name:"CAL_TEMP",          label:"溫度校準",           group:"cal",     next:[0],            critical:false },
            7:  { name:"FLIGHT_IGNITION",   label:"點火",               group:"flight",  next:[8],            critical:true  },
            8:  { name:"FLIGHT_POWERED",    label:"動力上升",           group:"flight",  next:[9],            critical:false },
            9:  { name:"FLIGHT_INERTIAL",   label:"慣性滑行",           group:"flight",  next:[10],           critical:false },
            10: { name:"FLIGHT_APOGEE",     label:"頂點 / 減速傘",      group:"flight",  next:[11],           critical:true  },
            11: { name:"FLIGHT_DESCENT",    label:"下降",               group:"flight",  next:[12,13],        critical:false },
            12: { name:"MAIN_CHUTE_DEPLOY", label:"分離引擎 / 開主傘", group:"flight",  next:[14],           critical:true  },
            13: { name:"SKIP_MAIN_CHUTE",   label:"跳過主傘",           group:"flight",  next:[14],           critical:true  },
            14: { name:"TERMINATE",         label:"任務終止",           group:"flight",  next:[],             critical:true  },
            15: { name:"DBG_COMM",          label:"Debug: 通訊",        group:"debug",   next:[0],            critical:false },
            16: { name:"DBG_SENSOR",        label:"Debug: 感測器",      group:"debug",   next:[0],            critical:false },
            17: { name:"DBG_STORAGE",       label:"Debug: 儲存",        group:"debug",   next:[0],            critical:false },
        };

        // 3D Rocket
        const Rocket3D = ({ q }) => {
            const containerRef = useRef();
            const rocketRef    = useRef();
            useEffect(() => {
                const scene    = new THREE.Scene();
                const camera   = new THREE.PerspectiveCamera(40, 1, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(140, 140);
                containerRef.current.appendChild(renderer.domElement);
                const group = new THREE.Group();
                group.add(new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,2.2,32), new THREE.MeshPhongMaterial({ color:0xdddddd })));
                const nose = new THREE.Mesh(new THREE.ConeGeometry(0.25,0.6,32), new THREE.MeshPhongMaterial({ color:0xff0000 }));
                nose.position.y = 1.4; group.add(nose);

                // 加入尾翼作為方向標示
                const finGeoZ = new THREE.BoxGeometry(0.05, 0.6, 0.4);
                const finGeoX = new THREE.BoxGeometry(0.4, 0.6, 0.05);
                
                // 紅色尾翼 (放在 +Z 軸) 也就是「正面」標示
                const finFront = new THREE.Mesh(finGeoZ, new THREE.MeshPhongMaterial({ color:0xff0000 }));
                finFront.position.set(0, -0.8, 0.35);
                group.add(finFront);
                
                const finBack = new THREE.Mesh(finGeoZ, new THREE.MeshPhongMaterial({ color:0x555555 }));
                finBack.position.set(0, -0.8, -0.35);
                group.add(finBack);
                
                const finRight = new THREE.Mesh(finGeoX, new THREE.MeshPhongMaterial({ color:0x555555 }));
                finRight.position.set(0.35, -0.8, 0);
                group.add(finRight);
                
                const finLeft = new THREE.Mesh(finGeoX, new THREE.MeshPhongMaterial({ color:0x555555 }));
                finLeft.position.set(-0.35, -0.8, 0);
                group.add(finLeft);

                scene.add(group); rocketRef.current = group;
                scene.add(new THREE.DirectionalLight(0xffffff,1.2).set ? (() => { const l = new THREE.DirectionalLight(0xffffff,1.2); l.position.set(5,5,5); scene.add(l); return null; })() : null);
                const dl = new THREE.DirectionalLight(0xffffff,1.2); dl.position.set(5,5,5); scene.add(dl);
                scene.add(new THREE.AmbientLight(0x222222)); camera.position.z = 4.5;
                const animate = () => { requestAnimationFrame(animate); renderer.render(scene, camera); };
                animate();
                return () => { try { containerRef.current.removeChild(renderer.domElement); } catch(e){} };
            }, []);
            useEffect(() => {
                if (rocketRef.current && q) {
                    // 根據實測校準數據：
                    // 左傾90度 (Nose Left)  => QX = -0.707
                    // 右傾90度 (Nose Right) => QX = +0.707
                    // 這代表實體感測器的 X 軸是「朝後 (Into screen)」，Y 軸是「朝左」，Z 軸是「朝上」
                    // Three.js 座標系：X 朝右，Y 朝上，Z 朝前 (Out of screen)
                    // 映射關係：Three.X = -Phys.Y, Three.Y = Phys.Z, Three.Z = -Phys.X
                    // 因此四元數映射為：x' = -q.y, y' = q.z, z' = -q.x, w' = q.w
                    rocketRef.current.setRotationFromQuaternion(new THREE.Quaternion(-q[2], q[3], -q[1], q[0]));
                }
            }, [q]);
            return <div ref={containerRef}></div>;
        };

        // Main App
        const App = () => {
            const [currStateId, setCurrStateId] = useState(0);
            const [wsConnected, setWsConnected] = useState(false);
            const [isLive,      setIsLive]      = useState(true);
            const [histIdx,     setHistIdx]     = useState(0);
            const [history,     setHistory]     = useState([]);
            const [cmdLog,      setCmdLog]      = useState([]);
            const wsRef = useRef(null);

            const addCmdLog = useCallback((msg) => {
                const t = new Date().toLocaleTimeString('zh-TW', { hour12:false });
                setCmdLog(prev => [`[${t}] ${msg}`, ...prev].slice(0, 100));
            }, []);

            // WebSocket — 永久連線，僅初始化一次
            useEffect(() => {
                let ws, timer;
                const connect = () => {
                    ws = new WebSocket("ws://localhost:8765");
                    wsRef.current = ws;
                    ws.onopen  = () => { setWsConnected(true);  addCmdLog("✅ 已連線至 Monitor WebSocket"); };
                    ws.onclose = () => { setWsConnected(false); addCmdLog("❌ WebSocket 斷線，3 秒後重連…"); timer = setTimeout(connect, 3000); };
                    ws.onerror = () => {};
                    ws.onmessage = (e) => {
                        try {
                            const d = JSON.parse(e.data);
                            if (d.batch) {
                                setHistory(h => [...h, d].slice(-1000));
                                // 攔截 LOG 封包，同步火箭端狀態
                                d.batch.forEach(b => {
                                    if (b.type === "LOG" && b.data && b.data.msg) {
                                        const transitionMatch = b.data.msg.match(/State:\s*\d+\s*->\s*(\d+)/);
                                        const currentMatch = b.data.msg.match(/\[SM\] Current State:\s*(\d+)/);
                                        if (transitionMatch) {
                                            setCurrStateId(parseInt(transitionMatch[1], 10));
                                        } else if (currentMatch) {
                                            setCurrStateId(parseInt(currentMatch[1], 10));
                                        }
                                    }
                                });
                            }
                        } catch {}
                    };
                };
                connect();
                return () => { clearTimeout(timer); if (ws) ws.close(); };
            }, []);

            useEffect(() => {
                if (isLive && history.length > 0) setHistIdx(history.length - 1);
            }, [history.length, isLive]);

            // 發送狀態切換指令
            const sendStateCommand = useCallback((stateId) => {
                const s = STATES[stateId];
                if (!s) return;
                if (s.critical) {
                    if (!window.confirm(`⚠️ 警告：即將發送飛行器指令\n\n→ [${stateId}] ${s.name}  (${s.label})\n\n此操作將直接影響飛行器，請再次確認！`)) return;
                }
                const ws = wsRef.current;
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type:"cmd", action:"setState", stateId }));
                    setCurrStateId(stateId);
                    addCmdLog(`📡 [GND→FC] 切換至 ${s.name} (${stateId})`);
                } else {
                    addCmdLog("❌ WebSocket 未連線，無法發送指令");
                }
            }, [addCmdLog]);

            // 衍生資料
            const currState  = STATES[currStateId];
            const nextStates = currState.next.map(id => ({ id, ...STATES[id] }));
            const normalNext   = nextStates.filter(s => !s.critical && s.group !== "debug");
            const criticalNext = nextStates.filter(s =>  s.critical);
            const debugNext    = nextStates.filter(s =>  s.group === "debug");

            const view   = isLive ? (history[history.length-1] || null) : history[histIdx];
            const getVal = (t) => view?.batch?.find(b => b.type === t)?.data;
            const alt    = getVal("KALMAN_ALTITUDE")?.alt ?? 0;
            const vel    = getVal("KALMAN_ALTITUDE")?.vz  ?? 0;
            const acc    = getVal("IMU")?.az               ?? 0;
            const q      = getVal("KALMAN_QUATERNION")?.q  ?? [1,0,0,0];
            const gps    = getVal("KALMAN_GPS") ?? getVal("GPS") ?? { lat: 0, lon: 0 };
            const fcLogs = view?.batch?.filter(b => b.type === "LOG").map(b => b.data.msg) ?? [];
            const imu    = getVal("IMU");
            const bmp    = getVal("BMP");
            const gpsRaw = getVal("GPS");

            return (
                <div className="h-full flex flex-col gap-3 relative">
                    <div className="scanline"></div>

                    {/* Header */}
                    <header className="glass-panel p-2 flex justify-between items-center glow-cyan">
                        <div className="text-lg font-bold text-neon uppercase tracking-tighter">JRI P2026 GND V2.1</div>
                        <div className="flex gap-3 items-center">
                            {!isLive && <div className="text-[9px] text-yellow-500 font-bold animate-pulse">HISTORICAL PLAYBACK</div>}
                            <div id="ws-status" className={`px-2 py-0.5 rounded text-[8px] font-bold border ${wsConnected ? 'bg-green-900/50 text-green-400 border-green-700' : 'bg-red-900/50 text-red-400 border-red-700 animate-pulse'}`}>
                                {wsConnected ? '● WS CONNECTED' : '○ WS DISCONNECTED'}
                            </div>
                            <div className="px-3 py-1 bg-black/60 border border-cyan-900 text-[10px] font-bold text-cyan-400">
                                [{currStateId}] {currState.name}
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex gap-3 overflow-hidden">

                        {/* 左側：遙測 + 3D + GPS */}
                        <div className="w-1/3 flex flex-col gap-3">
                            <div className="grid grid-cols-2 gap-2">
                                <TeleCard label="Alt"     val={alt.toFixed(1)} unit="m"   />
                                <TeleCard label="Vel"     val={vel.toFixed(0)} unit="m/s" />
                                <TeleCard label="Accel"   val={acc.toFixed(2)} unit="g"   />
                                <TeleCard label="Packets" val={view?.pkt ?? 0} unit="idx" />
                            </div>
                            <div className="glass-panel flex-1 flex flex-col items-center justify-center relative min-h-[140px]">
                                <div className="text-[9px] text-cyan-400 font-bold uppercase absolute top-2 left-2 flex flex-col gap-0.5 z-10">
                                    <span><span className="text-gray-500">QW:</span> {q[0].toFixed(3)}</span>
                                    <span><span className="text-gray-500">QX:</span> {q[1].toFixed(3)}</span>
                                    <span><span className="text-gray-500">QY:</span> {q[2].toFixed(3)}</span>
                                    <span><span className="text-gray-500">QZ:</span> {q[3].toFixed(3)}</span>
                                </div>
                                <Rocket3D q={q} />
                                <div className="text-[8px] text-gray-600 uppercase absolute bottom-2">Live Orientation</div>
                            </div>
                            {/* GPS MAP */}
                            <div className="glass-panel h-[160px] flex flex-col p-2 relative overflow-hidden">
                                <div className="text-[9px] text-cyan-400 font-bold uppercase mb-1 flex justify-between">
                                    <span>GPS MAP</span>
                                    <span className="text-gray-500 font-mono text-[8px]">{gps.lat !== 0 ? `${gps.lat.toFixed(5)}, ${gps.lon.toFixed(5)}` : 'NO FIX'}</span>
                                </div>
                                <div className="flex-1 rounded border border-cyan-900/30 overflow-hidden relative bg-black/50">
                                    {gps.lat !== 0 ? (
                                        <iframe 
                                            width="100%" height="100%" frameBorder="0" scrolling="no" 
                                            src={`https://www.openstreetmap.org/export/embed.html?bbox=${gps.lon-0.005},${gps.lat-0.005},${gps.lon+0.005},${gps.lat+0.005}&layer=mapnik&marker=${gps.lat},${gps.lon}`}
                                            className="opacity-80"
                                        ></iframe>
                                    ) : (
                                        <div className="absolute inset-0 flex items-center justify-center text-gray-700 text-[10px] font-bold tracking-widest">AWAITING SATELLITE LOCK</div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* 中間：Raw Sensors / 串流 / FC Log / GND CMD Log */}
                        <div className="flex-1 flex flex-col gap-3 overflow-hidden">
                            
                            {/* Raw Sensor Telemetry */}
                            <div className="glass-panel p-2 flex flex-col gap-1 shrink-0">
                                <div className="p-1 bg-cyan-900/10 border-b border-cyan-900/20 text-[8px] font-bold text-cyan-400 uppercase mb-1">Raw Sensor Telemetry</div>
                                <div className="grid grid-cols-3 gap-2">
                                    <div className="flex flex-col gap-0.5">
                                        <SensorValue label="ACC_X" val={imu?.ax?.toFixed(2) ?? '0.00'} unit="g" />
                                        <SensorValue label="ACC_Y" val={imu?.ay?.toFixed(2) ?? '0.00'} unit="g" />
                                        <SensorValue label="ACC_Z" val={imu?.az?.toFixed(2) ?? '0.00'} unit="g" />
                                    </div>
                                    <div className="flex flex-col gap-0.5">
                                        <SensorValue label="GYR_X" val={imu?.gx?.toFixed(1) ?? '0.0'} unit="°/s" />
                                        <SensorValue label="GYR_Y" val={imu?.gy?.toFixed(1) ?? '0.0'} unit="°/s" />
                                        <SensorValue label="GYR_Z" val={imu?.gz?.toFixed(1) ?? '0.0'} unit="°/s" />
                                    </div>
                                    <div className="flex flex-col gap-0.5">
                                        <SensorValue label="MAG_X" val={imu?.mx?.toFixed(1) ?? '0.0'} unit="uT" />
                                        <SensorValue label="MAG_Y" val={imu?.my?.toFixed(1) ?? '0.0'} unit="uT" />
                                        <SensorValue label="MAG_Z" val={imu?.mz?.toFixed(1) ?? '0.0'} unit="uT" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mt-1">
                                     <div className="flex flex-col gap-0.5">
                                        <SensorValue label="BMP_PRES" val={bmp?.pressure?.toFixed(2) ?? '0.00'} unit="hPa" />
                                        <SensorValue label="BMP_TEMP" val={bmp?.temp?.toFixed(1) ?? '0.0'} unit="°C" />
                                     </div>
                                     <div className="flex flex-col gap-0.5">
                                        <SensorValue label="GPS_LAT" val={gpsRaw?.lat?.toFixed(6) ?? '0.000000'} unit="°" />
                                        <SensorValue label="GPS_LON" val={gpsRaw?.lon?.toFixed(6) ?? '0.000000'} unit="°" />
                                     </div>
                                </div>
                            </div>

                            <div className="glass-panel flex flex-col overflow-hidden shrink-0" style={{height:"90px"}}>
                                <div className="p-1.5 bg-blue-900/10 border-b border-blue-900/20 text-[9px] font-bold text-blue-400 uppercase">Parsed JSON Batch Stream</div>
                                <div className="terminal-box custom-scrollbar p-2">
                                    {history.length === 0 
                                        ? <div className="text-gray-800 text-[8px]">— 尚無資料 —</div>
                                        : history.slice(-10).reverse().map((h,i) => (
                                            <div key={i} className="terminal-line text-blue-300 opacity-80 whitespace-nowrap overflow-hidden">{JSON.stringify(h.batch)}</div>
                                        ))
                                    }
                                </div>
                            </div>

                            <div className="glass-panel flex-1 p-2 overflow-y-auto font-mono text-[9px] custom-scrollbar">
                                <div className="text-[8px] text-gray-600 mb-1 font-bold">FC EVENT LOGS</div>
                                {fcLogs.length === 0
                                    ? <div className="text-gray-800 text-[8px]">— 尚無資料 —</div>
                                    : fcLogs.map((m,i) => <div key={i} className="text-cyan-900">[{new Date().toLocaleTimeString()}] {m}</div>)
                                }
                            </div>

                            <div className="glass-panel p-2 overflow-y-auto custom-scrollbar" style={{height:"100px"}}>
                                <div className="text-[8px] text-yellow-600 mb-1 font-bold uppercase">GND CMD Log</div>
                                {cmdLog.length === 0
                                    ? <div className="text-gray-800 text-[8px]">— 等待操作 —</div>
                                    : cmdLog.map((m,i) => <div key={i} className="text-yellow-500/70 text-[8px]">{m}</div>)
                                }
                            </div>
                        </div>

                        {/* 右側：狀態控制面板 */}
                        <div className="w-1/4 flex flex-col gap-3 relative">
                            {!isLive && (
                                <div className="absolute inset-0 bg-black/80 z-20 flex items-center justify-center">
                                    <button onClick={() => setIsLive(true)} className="px-4 py-1 bg-yellow-600 text-black font-bold text-[10px] rounded">RETURN LIVE</button>
                                </div>
                            )}

                            {/* Mission Sequence */}
                            <div className="glass-panel flex flex-col overflow-hidden flex-1">
                                <div className="p-2 bg-cyan-900/10 border-b border-cyan-900/20 text-[9px] font-bold text-cyan-500 uppercase">Mission Sequence</div>
                                <div className="p-2 flex flex-col gap-2 overflow-y-auto custom-scrollbar flex-1">
                                    {normalNext.length === 0 && <div className="text-[8px] text-gray-700 text-center py-2 border border-dashed border-gray-800">NO NEXT STEP</div>}
                                    {normalNext.map(s => (
                                        <button key={s.id} id={`btn-state-${s.id}`} onClick={() => sendStateCommand(s.id)} className="btn-base btn-sequence w-full py-2">
                                            [{s.id}] {s.label}
                                        </button>
                                    ))}
                                    {debugNext.map(s => (
                                        <button key={s.id} id={`btn-state-${s.id}`} onClick={() => sendStateCommand(s.id)} className="btn-base btn-debug w-full py-1.5">
                                            [{s.id}] {s.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Critical Operations */}
                            <div className="glass-panel flex flex-col overflow-hidden" style={{minHeight:"150px"}}>
                                <div className="p-2 bg-red-900/5 border-b border-red-900/20 text-[9px] font-bold text-red-500 uppercase">⚠ Critical Operations</div>
                                <div className="p-2 flex flex-col gap-2 flex-1">
                                    {criticalNext.map(s => (
                                        <button key={s.id} id={`btn-state-${s.id}`} onClick={() => sendStateCommand(s.id)} className="btn-base btn-emergency w-full py-3">
                                            [{s.id}] {s.label}
                                        </button>
                                    ))}
                                    {criticalNext.length === 0 && currStateId !== 14 && (
                                        <div className="text-[8px] text-gray-700 text-center py-2 border border-dashed border-gray-800">— 無緊急操作 —</div>
                                    )}
                                    {currStateId === 14 && (
                                        <div className="text-[8px] text-red-900 text-center py-4 border border-dashed border-red-900">☠ MISSION TERMINATED</div>
                                    )}
                                    {currStateId !== 14 && (
                                        <button id="btn-force-terminate" onClick={() => sendStateCommand(14)}
                                            className="btn-base btn-emergency w-full py-1.5 mt-auto opacity-50 hover:opacity-100 text-[9px]">
                                            ☠ FORCE TERMINATE [14]
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Timeline Scrubber */}
                    <div className="glass-panel p-2 flex items-center gap-3 h-9">
                        <span className="text-[8px] text-gray-600 shrink-0">TIMELINE</span>
                        <input type="range" min="0" max={Math.max(0, history.length-1)} value={histIdx}
                            onChange={e => { setIsLive(false); setHistIdx(parseInt(e.target.value)); }}
                            className="w-full h-1" />
                        <span className="text-[8px] text-gray-600 shrink-0">{history.length} pkt</span>
                    </div>
                </div>
            );
        };

        const TeleCard = ({ label, val, unit }) => (
            <div className="glass-panel p-2 h-14 flex flex-col justify-between border-l border-l-cyan-600">
                <div className="text-[7px] text-gray-600 font-bold uppercase">{label}</div>
                <div className="flex items-baseline gap-0.5 leading-none">
                    <span className="text-base font-bold">{val}</span>
                    <span className="text-[7px] text-cyan-900">{unit}</span>
                </div>
            </div>
        );

        const SensorValue = ({ label, val, unit }) => (
            <div className="flex justify-between items-center bg-black/40 px-1.5 py-0.5 rounded border border-gray-800/50">
                <span className="text-[7px] text-gray-500 font-bold">{label}</span>
                <span className="text-[8px] font-mono text-cyan-100">{val} <span className="text-cyan-800">{unit}</span></span>
            </div>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
